{{ template "header" . }}

<header>
    <h1>{{ .Exhibition.Title }}</h1>
</header>

<div class="voted-message">

    <a href="/results" class="btn btn-secondary">{{ call .T "view_results" }}</a>
</div>

{{ template "footer" . }}
